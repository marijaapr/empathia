<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Empathia - Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #7c6cf2;
            --primary-dark: #6858e8;
            --secondary: #a58bff;
            --bg: #f6f5ff;
            --card: rgba(255, 255, 255, 0.72);
            --border: rgba(255, 255, 255, 0.8);
            --text: #1f1f2e;
            --muted: #7b7b93;
            --danger: #dc2626;
            --success: #16a34a;
            --shadow: 0 10px 40px rgba(124, 108, 242, 0.12);
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #f7f5ff 0%, #f2f0ff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            color: var(--text);
        }

        body::before {
            content: "";
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(124, 108, 242, 0.18), transparent 70%);
            top: -200px;
            right: -150px;
            border-radius: 50%;
        }

        body::after {
            content: "";
            position: absolute;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(165, 139, 255, 0.15), transparent 70%);
            bottom: -180px;
            left: -120px;
            border-radius: 50%;
        }

        .login-container {
            width: 100%;
            max-width: 470px;
            padding: 24px;
            position: relative;
            z-index: 2;
        }

        .form-card {
            background: var(--card);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 42px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .form-card::before {
            content: "";
            position: absolute;
            width: 220px;
            height: 220px;
            background: radial-gradient(circle, rgba(124, 108, 242, 0.14), transparent 70%);
            top: -100px;
            right: -80px;
            border-radius: 50%;
        }

        .form-content {
            position: relative;
            z-index: 1;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 34px;
        }

        .logo {
            font-size: 34px;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .header-subtitle {
            color: var(--muted);
            font-size: 14px;
            font-weight: 500;
        }

        .tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.65);
            border-radius: 14px;
            padding: 5px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.6);
        }

        .tab-btn {
            flex: 1;
            border: none;
            background: transparent;
            padding: 13px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            color: var(--muted);
            cursor: pointer;
            transition: 0.3s ease;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            box-shadow: 0 6px 18px rgba(124, 108, 242, 0.25);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 12px;
            font-weight: 700;
            color: #55556d;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        input,
        select,
        textarea {
            width: 100%;
            border: 1.5px solid rgba(124, 108, 242, 0.12);
            background: rgba(255, 255, 255, 0.82);
            border-radius: 14px;
            padding: 14px 16px;
            font-size: 14px;
            color: var(--text);
            transition: all 0.25s ease;
            font-family: inherit;
        }

        textarea {
            resize: vertical;
            min-height: 90px;
        }

        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(124, 108, 242, 0.12);
        }

        input::placeholder,
        textarea::placeholder {
            color: #a0a0b8;
        }

        button[type="submit"] {
            width: 100%;
            border: none;
            border-radius: 14px;
            padding: 15px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
            box-shadow: 0 10px 25px rgba(124, 108, 242, 0.22);
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 30px rgba(124, 108, 242, 0.28);
        }

        button[type="submit"]:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .error,
        .success {
            display: none;
            margin-bottom: 16px;
            padding: 12px 14px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
        }

        .error.show,
        .success.show {
            display: block;
        }

        .error {
            background: rgba(220, 38, 38, 0.08);
            border: 1px solid rgba(220, 38, 38, 0.12);
            color: var(--danger);
        }

        .success {
            background: rgba(22, 163, 74, 0.08);
            border: 1px solid rgba(22, 163, 74, 0.12);
            color: var(--success);
        }

        #psychologistFields {
            margin-top: 12px;
            padding-top: 8px;
        }

        @media (max-width: 640px) {
            body {
                overflow-y: auto;
                padding: 20px 0;
            }

            .login-container {
                padding: 18px;
            }

            .form-card {
                padding: 28px 22px;
                border-radius: 22px;
            }

            .logo {
                font-size: 28px;
            }

            input,
            select,
            textarea,
            button[type="submit"] {
                font-size: 16px;
            }
        }
    </style>
</head>

<body>

<div class="login-container">
    <div class="form-card">
        <div class="form-content">

            <div class="auth-header">
                <div class="logo">Empathia</div>
                <p class="header-subtitle">
                    AI Emotional Support Platform
                </p>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('login', event)">
                    Login
                </button>

                <button class="tab-btn" onclick="switchTab('signup', event)">
                    Sign Up
                </button>
            </div>

            <!-- LOGIN -->
            <form id="loginForm" class="tab-content active" onsubmit="handleLogin(event)">

                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input
                        type="email"
                        id="login-email"
                        required
                        placeholder="your@email.com"
                    />
                </div>

                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input
                        type="password"
                        id="login-password"
                        required
                        placeholder="Enter your password"
                    />
                </div>

                <div class="error" id="loginError"></div>
                <div class="success" id="loginSuccess"></div>

                <button type="submit" id="loginBtn">
                    Login
                </button>

            </form>

            <!-- SIGNUP -->
            <form id="signupForm" class="tab-content" onsubmit="handleSignup(event)">

                <div class="form-group">
                    <label for="signup-role">Account Type</label>

                    <select id="signup-role" required>
                        <option value="user">Regular User</option>
                        <option value="psychologist">Psychologist</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="signup-email">Email</label>

                    <input
                        type="email"
                        id="signup-email"
                        required
                        placeholder="your@email.com"
                    />
                </div>

                <div class="form-group">
                    <label for="signup-username">Full Name</label>

                    <input
                        type="text"
                        id="signup-username"
                        placeholder="Your full name"
                    />
                </div>

                <div class="form-group">
                    <label for="signup-password">Password</label>

                    <input
                        type="password"
                        id="signup-password"
                        required
                        placeholder="Create a secure password"
                    />
                </div>

                <div class="form-group">
                    <label for="signup-password-confirm">Confirm Password</label>

                    <input
                        type="password"
                        id="signup-password-confirm"
                        required
                        placeholder="Repeat password"
                    />
                </div>

                <!-- Psychologist Fields -->
                <div id="psychologistFields" style="display:none;">

                    <div class="form-group">
                        <label for="signup-license">
                            License Number <span style="color: var(--danger);">*</span>
                        </label>

                        <input
                            type="text"
                            id="signup-license"
                            placeholder="Professional license number"
                            data-psychologist-required="true"
                        />
                    </div>

                    <div class="form-group">
                        <label for="signup-bio">
                            Professional Bio <span style="color: var(--danger);">*</span>
                        </label>

                        <textarea
                            id="signup-bio"
                            placeholder="Describe your experience and expertise"
                            data-psychologist-required="true"
                        ></textarea>
                    </div>

                    <div class="form-group">
                        <label for="signup-specializations">
                            Specializations <span style="color: var(--danger);">*</span>
                        </label>

                        <input
                            type="text"
                            id="signup-specializations"
                            placeholder="e.g., Anxiety, Depression, Trauma (comma-separated)"
                            data-psychologist-required="true"
                        />
                    </div>

                </div>

                <div class="error" id="signupError"></div>
                <div class="success" id="signupSuccess"></div>

                <button type="submit" id="signupBtn">
                    Create Account
                </button>

            </form>

        </div>
    </div>
</div>

<script>

    function switchTab(tab, event) {

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.remove('active');
        });

        event.target.classList.add('active');

        document.querySelectorAll('.tab-content').forEach(form => {
            form.classList.remove('active');
        });

        if (tab === 'login') {
            document.getElementById('loginForm').classList.add('active');
        } else {
            document.getElementById('signupForm').classList.add('active');
        }

        document.getElementById('loginError').classList.remove('show');
        document.getElementById('signupError').classList.remove('show');
    }

    // psychologist fields toggle
    document.getElementById('signup-role').addEventListener('change', function () {

        const psychologistFields = document.getElementById('psychologistFields');

        if (this.value === 'psychologist') {
            psychologistFields.style.display = 'block';
            // Clear any previous error when switching roles
            document.getElementById('signupError').classList.remove('show');
            console.log('✅ Psychologist role selected - additional fields visible');
        } else {
            psychologistFields.style.display = 'none';
            console.log('✅ Regular User role selected');
        }
    });

    async function handleLogin(event) {

        event.preventDefault();

        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;

        const errorEl = document.getElementById('loginError');
        const btn = document.getElementById('loginBtn');

        errorEl.classList.remove('show');

        btn.disabled = true;
        btn.textContent = 'Logging in...';

        try {

            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    email,
                    password
                })
            });

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.error || 'Login failed');
            }

            localStorage.setItem('access_token', data.access_token);
            localStorage.setItem('refresh_token', data.refresh_token);
            localStorage.setItem('user_id', data.user_id);
            localStorage.setItem('email', data.email);
            localStorage.setItem('role', data.role || 'user');

            // Redirect based on role
            if (data.role === 'psychologist') {
                window.location.href = '/psychologist/dashboard';
            } else {
                window.location.href = '/chat';
            }

        } catch (error) {

            errorEl.textContent = error.message;
            errorEl.classList.add('show');

            btn.disabled = false;
            btn.textContent = 'Login';
        }
    }

    async function handleSignup(event) {

        event.preventDefault();

        const role = document.getElementById('signup-role').value;

        const email = document.getElementById('signup-email').value;
        const username = document.getElementById('signup-username').value;
        const password = document.getElementById('signup-password').value;

        const passwordConfirm = document.getElementById('signup-password-confirm').value;

        const license = document.getElementById('signup-license').value;
        const bio = document.getElementById('signup-bio').value;

        const specializations =
            document.getElementById('signup-specializations').value;

        const errorEl = document.getElementById('signupError');
        const successEl = document.getElementById('signupSuccess');

        const btn = document.getElementById('signupBtn');

        errorEl.classList.remove('show');
        successEl.classList.remove('show');

        if (password !== passwordConfirm) {

            errorEl.textContent = 'Passwords do not match';
            errorEl.classList.add('show');

            return;
        }

        // Validate psychologist fields
        if (role === 'psychologist') {
            if (!license || !bio || !specializations) {
                errorEl.textContent = 'For psychologists: License, Bio, and Specializations are required';
                errorEl.classList.add('show');
                return;
            }
        }

        btn.disabled = true;
        btn.textContent = 'Creating account...';

        try {
            console.log('📤 Sending signup request with role:', role);
            console.log('   Email:', email);
            console.log('   Username:', username);
            if (role === 'psychologist') {
                console.log('   License:', license);
                console.log('   Bio:', bio);
                console.log('   Specializations:', specializations);
            }

            const response = await fetch('/api/auth/signup', {

                method: 'POST',

                headers: {
                    'Content-Type': 'application/json'
                },

                body: JSON.stringify({
                    role,
                    email,
                    username,
                    password,
                    license,
                    bio,
                    specializations
                })
            });

            const data = await response.json();

            if (!response.ok) {
                console.error('❌ Signup failed:', data.error);
                throw new Error(data.error || 'Signup failed');
            }

            console.log('✅ Signup successful!', data);
            successEl.textContent =
                data.message + ' You can now login.';

            successEl.classList.add('show');

            document.getElementById('signupForm').reset();

            document.getElementById('psychologistFields').style.display = 'none';

            setTimeout(() => {

                document.querySelectorAll('.tab-btn').forEach(btn => {
                    btn.classList.remove('active');
                });

                document.querySelector('.tab-btn').classList.add('active');

                document.querySelectorAll('.tab-content').forEach(form => {
                    form.classList.remove('active');
                });

                document.getElementById('loginForm').classList.add('active');

                // Auto-fill login form with signup email
                document.getElementById('login-email').value = email;
                document.getElementById('login-password').value = password;

            }, 2000);

        } catch (error) {

            errorEl.textContent = error.message;
            errorEl.classList.add('show');

            btn.disabled = false;
            btn.textContent = 'Create Account';
        }
    }

</script>

</body>
</html>
